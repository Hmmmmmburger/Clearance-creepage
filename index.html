<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clearance & Creepage Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="app-wrapper">

        <!-- 標題卡 -->
        <div class="card header-card">
            <div class="header-text">
                <h1>Clearance & Creepage calculator</h1>
            </div>
        </div>

        <!-- 上區塊：絕緣間距 -->
        <div class="card">
            <div class="section-header">
                <div class="badge badge-blue">01</div>
                <div>
                    <div class="section-title">Clearance</div>
                </div>
            </div>

            <div class="spec-row">
                <span class="spec-label">Criteria</span>
                <div class="spec-right">
                    <input type="number" id="clearance-spec" class="spec-input" placeholder="0.00" step="0.01"
                        min="0" />
                    <span class="unit">mm</span>
                </div>
            </div>

            <div class="table-wrap">
                <div class="table-head">
                    <span>Measure path</span>
                    <span class="align-right">Unit : mm</span>
                </div>
                <div id="clearance-rows"></div>
            </div>

            <div class="result-card" id="clearance-result">
                <span class="result-label">Total distance</span>
                <span class="result-total" id="clearance-total">— mm</span>
                <span class="result-verdict" id="clearance-verdict"></span>
            </div>

            <div class="btn-row">
                <button class="btn-reset" onclick="resetSection('clearance')">Clear All</button>
            </div>
        </div>

        <!-- 分隔線 -->
        <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-dot">✦</span>
            <span class="divider-line"></span>
        </div>

        <!-- 下區塊：爬電距離 -->
        <div class="card">
            <div class="section-header">
                <div class="badge badge-green">02</div>
                <div>
                    <div class="section-title">Creepage</div>
                </div>
            </div>

            <div class="spec-row">
                <span class="spec-label">Criteria</span>
                <div class="spec-right">
                    <input type="number" id="creepage-spec" class="spec-input" placeholder="0.00" step="0.01" min="0" />
                    <span class="unit">mm</span>
                </div>
            </div>

            <div class="table-wrap">
                <div class="table-head">
                    <span>Measure path</span>
                    <span class="align-right">unit : mm</span>
                </div>
                <div id="creepage-rows"></div>
            </div>

            <div class="result-card" id="creepage-result">
                <span class="result-label">Total distance</span>
                <span class="result-total" id="creepage-total">— mm</span>
                <span class="result-verdict" id="creepage-verdict"></span>
            </div>

            <div class="btn-row">
                <button class="btn-reset" onclick="resetSection('creepage')">Clear All</button>
            </div>
        </div>

        <!-- 頁尾 -->
        <div class="footer">Clearance & Creepage Checker &nbsp;·&nbsp; James Hsieh</div>

    </div>

    <script src="app.js"></script>
</body>

</html>
