<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clearance & Creepage 計算器</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header class="app-header">
        <div class="header-icon">⚡</div>
        <div class="header-text">
            <h1>Clearance <span class="amp">&amp;</span> Creepage</h1>
            <p>電氣間距檢查計算工具</p>
        </div>
    </header>

    <main class="app-main">

        <!-- ═══════════════════════════════════════
         上區塊：絕緣間距 Clearance
    ═══════════════════════════════════════ -->
        <section class="check-section" id="clearance-section">
            <div class="section-header clearance-header">
                <div class="section-badge">01</div>
                <div>
                    <div class="section-title">絕緣間距</div>
                    <div class="section-subtitle">Clearance</div>
                </div>
            </div>

            <!-- 規範最小值 -->
            <div class="spec-row">
                <label class="spec-label">規範最小值（Spec Min）</label>
                <div class="spec-input-wrap">
                    <input type="number" id="clearance-spec" class="spec-input" placeholder="0.00" step="0.01"
                        min="0" />
                    <span class="unit-tag">mm</span>
                </div>
            </div>

            <!-- 7 個量測輸入列 -->
            <div class="measure-table">
                <div class="measure-head">
                    <span class="col-name">量測名稱</span>
                    <span class="col-value">數值 (mm)</span>
                </div>
                <div id="clearance-rows" class="measure-body">
                    <!-- 由 JS 產生 -->
                </div>
            </div>

            <!-- 結果 -->
            <div class="result-block" id="clearance-result">
                <div class="result-inner">
                    <span class="result-label">累計距離</span>
                    <span class="result-total" id="clearance-total">— mm</span>
                    <span class="result-verdict" id="clearance-verdict"></span>
                </div>
            </div>

            <!-- 操作按鈕 -->
            <div class="action-row">
                <button class="btn btn-reset" onclick="resetSection('clearance')">清除全部</button>
            </div>
        </section>

        <div class="section-divider">
            <span class="divider-line"></span>
            <span class="divider-icon">✦</span>
            <span class="divider-line"></span>
        </div>

        <!-- ═══════════════════════════════════════
         下區塊：爬電距離 Creepage
    ═══════════════════════════════════════ -->
        <section class="check-section" id="creepage-section">
            <div class="section-header creepage-header">
                <div class="section-badge">02</div>
                <div>
                    <div class="section-title">爬電距離</div>
                    <div class="section-subtitle">Creepage</div>
                </div>
            </div>

            <!-- 規範最小值 -->
            <div class="spec-row">
                <label class="spec-label">規範最小值（Spec Min）</label>
                <div class="spec-input-wrap">
                    <input type="number" id="creepage-spec" class="spec-input" placeholder="0.00" step="0.01" min="0" />
                    <span class="unit-tag">mm</span>
                </div>
            </div>

            <!-- 7 個量測輸入列 -->
            <div class="measure-table">
                <div class="measure-head">
                    <span class="col-name">量測名稱</span>
                    <span class="col-value">數值 (mm)</span>
                </div>
                <div id="creepage-rows" class="measure-body">
                    <!-- 由 JS 產生 -->
                </div>
            </div>

            <!-- 結果 -->
            <div class="result-block" id="creepage-result">
                <div class="result-inner">
                    <span class="result-label">累計距離</span>
                    <span class="result-total" id="creepage-total">— mm</span>
                    <span class="result-verdict" id="creepage-verdict"></span>
                </div>
            </div>

            <!-- 操作按鈕 -->
            <div class="action-row">
                <button class="btn btn-reset" onclick="resetSection('creepage')">清除全部</button>
            </div>
        </section>

    </main>

    <footer class="app-footer">
        <span>Clearance &amp; Creepage Checker</span>
        <span class="footer-dot">·</span>
        <span>單位 mm · IEC 60664-1</span>
    </footer>

    <script src="app.js"></script>
</body>

</html>
